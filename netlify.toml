[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[[redirects]]
  from = "/api/bootstrap"
  to = "/.netlify/functions/bootstrap"
  status = 200

[[redirects]]
  from = "/api/live"
  to = "/.netlify/functions/live"
  status = 200

[[redirects]]
  from = "/api/search"
  to = "/.netlify/functions/search"
  status = 200

[[redirects]]
  from = "/api/favorites"
  to = "/.netlify/functions/favorites"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
