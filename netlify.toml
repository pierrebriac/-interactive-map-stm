[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  included_files = ["generated/network-model.json"]

[[redirects]]
  from = "/api/bootstrap"
  to = "/.netlify/functions/bootstrap"
  status = 200

[[redirects]]
  from = "/api/live"
  to = "/.netlify/functions/live"
  status = 200

[[redirects]]
  from = "/api/search"
  to = "/.netlify/functions/search"
  status = 200

[[redirects]]
  from = "/api/favorites"
  to = "/.netlify/functions/favorites"
  status = 200

[[redirects]]
  from = "/api/profile"
  to = "/.netlify/functions/profile"
  status = 200

[[redirects]]
  from = "/api/bixi"
  to = "/.netlify/functions/bixi"
  status = 200

[[redirects]]
  from = "/api/geocode"
  to = "/.netlify/functions/geocode"
  status = 200

[[redirects]]
  from = "/api/plan"
  to = "/.netlify/functions/plan"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
